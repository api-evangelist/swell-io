      summary: Update Content Page
      operationId: updatePage
      requestBody: { required: true, content: { application/json: { schema: { type: object } } } }
      responses: { '200': { description: Updated. } }
    delete:
      tags: [Content]
      summary: Delete Content Page
      operationId: deletePage
      responses: { '200': { description: Deleted. } }
  /files:
    get:
      tags: [Files]
      summary: List Files
      operationId: listFiles
      responses: { '200': { description: Files. } }
    post:
      tags: [Files]
      summary: Upload File
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses: { '201': { description: File uploaded. } }
  /events:
    get:
      tags: [Events]
      summary: List Events
      operationId: listEvents
      responses: { '200': { description: Events. } }
  /webhooks:
    get:
      tags: [Webhooks]
      summary: List Webhook Subscriptions
      operationId: listWebhooks
      responses:
        '200':
          description: Webhook subscriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookList'
    post:
      tags: [Webhooks]
      summary: Create Webhook Subscription
      operationId: createWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookCreate'
      responses:
        '201':
          description: Webhook subscription created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
  /webhooks/{id}:
    parameters: [ { $ref: '#/components/parameters/PathId' } ]
    get:
      tags: [Webhooks]
      summary: Retrieve Webhook Subscription
      operationId: getWebhook
      responses:
        '200':
          description: Webhook.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
    put:
      tags: [Webhooks]
      summary: Update Webhook Subscription
      operationId: updateWebhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookUpdate'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
    delete:
      tags: [Webhooks]
      summary: Delete Webhook Subscription
      operationId: deleteWebhook
      responses: { '200': { description: Deleted. } }
components:
  securitySchemes:
    SwellStoreId:
      type: apiKey
      in: header
      name: X-Store-Id
      description: Your Swell store ID, found in the Developer section of the dashboard.
    SwellSecretKey:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        Secret API key prefixed with `sk_`. Sent as `Authorization: Basic <base64(store-id:secret-key)>` or
        equivalent custom header by official libraries.
  parameters:
    PathId:
      name: id
      in: path
      required: true
      description: The object ID of the resource.
      schema:
        type: string
        pattern: "^[a-f0-9]{24}$"
    Limit:
      name: limit
      in: query
      description: Records per page (1-1000). Default 15.
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 15
    Page:
      name: page
      in: query
      description: Result page number, 1-indexed.
      schema:
        type: integer
        minimum: 1
        default: 1
    Where:
      name: where
      in: query
      description: MongoDB-style filter object. Supports operators $eq, $ne, $gt, $gte, $lt, $lte, $in, $nin, $regex, $type, $exists, $and, $or, $nor, $all, $elemMatch, $size.
      schema:
        type: object
    Sort:
      name: sort
      in: query
      description: 'Sort expression, e.g. "name asc" or "date_created desc".'
      schema:
        type: string
    Search:
      name: search
      in: query
      description: Full-text search across model-specific searchable fields.
      schema:
        type: string
    Expand:
      name: expand
      in: query
      description: 'Include related objects, e.g. expand=account or expand=variants:10.'
      schema:
        type: string
    Fields:
      name: fields
      in: query
      description: Comma-separated list of fields to return.
      schema:
        type: string
  schemas:
    Pagination:
      type: object
      properties:
        count:
          type: integer
        page:
          type: integer
        pages:
          type: object
    Money:
      type: number
      format: float
      description: Currency amount expressed in store currency.
    ObjectId:
      type: string
      pattern: "^[a-f0-9]{24}$"
    Product:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        name: { type: string }
        slug: { type: string }
        sku: { type: string }
        active: { type: boolean }
        type:
          type: string
          enum: [standard, subscription, bundle, giftcard]
        delivery:
          type: string
          enum: [shipment, subscription, giftcard, null]
          nullable: true
        price: { $ref: '#/components/schemas/Money' }
        sale_price: { $ref: '#/components/schemas/Money' }
        sale: { type: boolean }
        currency: { type: string, description: 'ISO 4217 currency code.' }
        description: { type: string }
        stock_tracking: { type: boolean }
        stock_level: { type: integer }
        stock_status:
          type: string
          enum: [in_stock, out_of_stock, preorder, backorder]
        stock_purchasable: { type: boolean }
        variable: { type: boolean }
        variants: { type: array, items: { type: object } }
        options: { type: array, items: { type: object } }
        bundle: { type: boolean }
        bundle_items: { type: array, items: { type: object } }
        purchase_options: { type: object }
        category_id: { $ref: '#/components/schemas/ObjectId' }
        categories: { type: array, items: { type: object } }
        related_product_ids: { type: array, items: { $ref: '#/components/schemas/ObjectId' } }
        cross_sells: { type: array, items: { type: object } }
        up_sells: { type: array, items: { type: object } }
        shipment_weight: { type: number }
        shipment_dimensions: { type: object }
        shipment_location: { type: string }
        shipment_prices: { type: array, items: { type: object } }
        images: { type: array, items: { type: object } }
        tags: { type: array, items: { type: string } }
        meta_title: { type: string }
        meta_keywords: { type: string }
        meta_description: { type: string }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }
      required: [name, sku]
    ProductCreate:
      allOf:
        - $ref: '#/components/schemas/Product'
    ProductUpdate:
      allOf:
        - $ref: '#/components/schemas/Product'
    ProductList:
      type: object
      properties:
        count: { type: integer }
        page: { type: integer }
        results:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pages: { type: object }
    Cart:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        status:
          type: string
          enum: [active, converted, abandoned, recovered]
        account_id: { $ref: '#/components/schemas/ObjectId' }
        items: { type: array, items: { type: object } }
        billing: { type: object }
        shipping: { type: object }
        sub_total: { $ref: '#/components/schemas/Money' }
        discount_total: { $ref: '#/components/schemas/Money' }
        tax_total: { $ref: '#/components/schemas/Money' }
        shipment_total: { $ref: '#/components/schemas/Money' }
        grand_total: { $ref: '#/components/schemas/Money' }
        coupon_code: { type: string }
        currency: { type: string }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }
    CartCreate: { $ref: '#/components/schemas/Cart' }
    CartUpdate: { $ref: '#/components/schemas/Cart' }
    CartList:
      type: object
      properties:
        count: { type: integer }
        page: { type: integer }
        results: { type: array, items: { $ref: '#/components/schemas/Cart' } }
    Order:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        number: { type: string }
        account_id: { $ref: '#/components/schemas/ObjectId' }
        status:
          type: string
          enum: [pending, draft, payment_pending, delivery_pending, hold, complete, canceled]
        items: { type: array, items: { type: object } }
        billing: { type: object }
        shipping: { type: object }
        sub_total: { $ref: '#/components/schemas/Money' }
        discount_total: { $ref: '#/components/schemas/Money' }
        tax_total: { $ref: '#/components/schemas/Money' }
        shipment_total: { $ref: '#/components/schemas/Money' }
        grand_total: { $ref: '#/components/schemas/Money' }
        payment_balance: { $ref: '#/components/schemas/Money' }
        paid: { type: boolean }
        delivered: { type: boolean }
        refunded: { type: boolean }
        canceled: { type: boolean }
        coupon_code: { type: string }
        giftcards: { type: array, items: { type: object } }
        comments: { type: string }
        metadata: { type: object }
        test: { type: boolean }
        currency: { type: string }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }
    OrderCreate: { $ref: '#/components/schemas/Order' }
    OrderUpdate: { $ref: '#/components/schemas/Order' }
    OrderList:
      type: object
      properties:
        count: { type: integer }
        page: { type: integer }
        results: { type: array, items: { $ref: '#/components/schemas/Order' } }
    Payment:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        number: { type: string }
        account_id: { $ref: '#/components/schemas/ObjectId' }
        order_id: { $ref: '#/components/schemas/ObjectId' }
        amount: { $ref: '#/components/schemas/Money' }
        amount_refundable: { $ref: '#/components/schemas/Money' }
        amount_refunded: { $ref: '#/components/schemas/Money' }
        method:
          type: string
          enum: [card, account, amazon, paypal, manual]
        gateway: { type: string }
        status:
          type: string
          enum: [pending, error, success, authorized]
        transaction_id: { type: string }
        currency: { type: string }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }
    PaymentCreate: { $ref: '#/components/schemas/Payment' }
    PaymentList:
      type: object
      properties:
        count: { type: integer }
        page: { type: integer }
        results: { type: array, items: { $ref: '#/components/schemas/Payment' } }
    Refund:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        payment_id: { $ref: '#/components/schemas/ObjectId' }
        amount: { $ref: '#/components/schemas/Money' }
        reason: { type: string }
        date_created: { type: string, format: date-time }
    RefundCreate: { $ref: '#/components/schemas/Refund' }
    Subscription:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        number: { type: string }
        account_id: { $ref: '#/components/schemas/ObjectId' }
        product_id: { $ref: '#/components/schemas/ObjectId' }
        plan_id: { $ref: '#/components/schemas/ObjectId' }
        status:
          type: string
          enum: [active, paid, unpaid, canceled, trial, pastdue, complete, paused]
        interval: { type: string, enum: [daily, weekly, monthly, yearly] }
        interval_count: { type: integer }
        trial_days: { type: integer }
        price: { $ref: '#/components/schemas/Money' }
        recurring_total: { $ref: '#/components/schemas/Money' }
        date_period_start: { type: string, format: date-time }
        date_period_end: { type: string, format: date-time }
        date_canceled: { type: string, format: date-time }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }
    SubscriptionCreate: { $ref: '#/components/schemas/Subscription' }
    SubscriptionUpdate: { $ref: '#/components/schemas/Subscription' }
    SubscriptionList:
      type: object
      properties:
        count: { type: integer }
        page: { type: integer }
        results: { type: array, items: { $ref: '#/components/schemas/Subscription' } }
    Account:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        email: { type: string, format: email }
        name: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        type: { type: string, enum: [individual, business] }
        currency: { type: string }
        group: { type: string }
        balance: { $ref: '#/components/schemas/Money' }
        billing: { type: object }
        shipping: { type: object }
        order_count: { type: integer }
        order_value: { $ref: '#/components/schemas/Money' }
        cart_abandoned_count: { type: integer }
        email_optin: { type: boolean }
        date_first_order: { type: string, format: date-time }
        date_last_order: { type: string, format: date-time }
        date_last_login: { type: string, format: date-time }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }
      required: [email]
    AccountCreate: { $ref: '#/components/schemas/Account' }
    AccountUpdate: { $ref: '#/components/schemas/Account' }
    AccountList:
      type: object
      properties:
        count: { type: integer }
        page: { type: integer }
        results: { type: array, items: { $ref: '#/components/schemas/Account' } }
    Webhook:
      type: object
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        url: { type: string, format: uri }
        events: { type: array, items: { type: string } }
        enabled: { type: boolean }
        auto_disabled: { type: boolean }
        schedule: { type: object }
        date_created: { type: string, format: date-time }
        date_updated: { type: string, format: date-time }
      required: [url, events]
    WebhookCreate: { $ref: '#/components/schemas/Webhook' }
    WebhookUpdate: { $ref: '#/components/schemas/Webhook' }
    WebhookList:
      type: object
      properties:
        count: { type: integer }
        page: { type: integer }
        results: { type: array, items: { $ref: '#/components/schemas/Webhook' } }
    Error:
      type: object
      properties:
        errors:
          type: object
          additionalProperties:
            type: object
            properties:
              code: { type: string }
              message: { type: string }
              params: { type: object }
